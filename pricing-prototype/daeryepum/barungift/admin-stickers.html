<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바른기프트 - 스티커 관리</title>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .toast-slide { animation: toastSlide 0.3s ease-out; }
    @keyframes toastSlide { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    .spinner-sm { border: 2px solid #E5E7EB; border-top-color: #3B82F6; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-backdrop { background: rgba(0,0,0,0.4); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Toast Container -->
<div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

<!-- Header -->
<header class="bg-slate-800 text-white">
  <div class="px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold">바른기프트 스티커 관리</h1>
      <nav class="flex gap-3 mt-1 text-sm text-slate-300">
        <a href="/barungift/admin" class="hover:text-white transition-colors">대시보드</a>
        <span class="text-slate-500">|</span>
        <a href="/barungift/admin/products" class="hover:text-white transition-colors">상품설정</a>
        <span class="text-slate-500">|</span>
        <span class="text-blue-300 font-medium">스티커 관리</span>
      </nav>
    </div>
    <button onclick="openCreateModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      스티커 생성
    </button>
  </div>
</header>

<!-- Main Content -->
<main class="px-6 py-6">
  <!-- Loading State -->
  <div id="loadingState" class="flex items-center justify-center py-20">
    <div class="text-center">
      <div class="spinner-sm mx-auto mb-3" style="width:32px;height:32px;border-width:3px;"></div>
      <p class="text-gray-500 text-sm">스티커 목록을 불러오는 중...</p>
    </div>
  </div>

  <!-- Empty State -->
  <div id="emptyState" class="hidden text-center py-20">
    <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
    </div>
    <p class="text-gray-500 text-sm mb-4">등록된 스티커가 없습니다.</p>
    <button onclick="openCreateModal()" class="text-blue-600 hover:text-blue-700 text-sm font-medium">+ 새 스티커 생성</button>
  </div>

  <!-- Error State -->
  <div id="errorState" class="hidden text-center py-20">
    <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </div>
    <p class="text-gray-600 text-sm mb-2">데이터를 불러오는 중 오류가 발생했습니다.</p>
    <p id="errorStateMsg" class="text-gray-400 text-xs mb-4"></p>
    <button onclick="loadStickers()" class="text-blue-600 hover:text-blue-700 text-sm font-medium">다시 시도</button>
  </div>

  <!-- Table -->
  <div id="tableContainer" class="hidden">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200 text-left">
              <th class="px-4 py-3 font-semibold text-gray-600 w-20">미리보기</th>
              <th class="px-4 py-3 font-semibold text-gray-600">스티커명</th>
              <th class="px-4 py-3 font-semibold text-gray-600 text-center w-28">커스텀영역</th>
              <th class="px-4 py-3 font-semibold text-gray-600 text-center w-24">상태</th>
              <th class="px-4 py-3 font-semibold text-gray-600 w-32">생성일</th>
              <th class="px-4 py-3 font-semibold text-gray-600 text-center w-32">관리</th>
            </tr>
          </thead>
          <tbody id="stickerTableBody"></tbody>
        </table>
      </div>
    </div>
    <p id="stickerCount" class="text-xs text-gray-400 mt-3 px-1"></p>
  </div>
</main>

<!-- Create/Edit Modal -->
<div id="stickerModal" class="hidden fixed inset-0 z-40 modal-backdrop flex items-start justify-center overflow-y-auto py-8">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl mx-4 fade-in" onclick="event.stopPropagation()">
    <!-- Modal Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <h2 id="modalTitle" class="text-lg font-bold text-gray-900">스티커 생성</h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="px-6 py-5 space-y-5 max-h-[70vh] overflow-y-auto">
      <!-- Sticker Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">스티커명 <span class="text-red-500">*</span></label>
        <input id="fieldName" type="text" placeholder="예: 클래식 감사 스티커" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
      </div>

      <!-- Color + Image URL row -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">배경색</label>
          <div class="flex items-center gap-2">
            <input id="fieldColorPicker" type="color" value="#FFF5E6" class="w-10 h-10 rounded border border-gray-300 cursor-pointer p-0.5" oninput="document.getElementById('fieldColorHex').value=this.value">
            <input id="fieldColorHex" type="text" value="#FFF5E6" placeholder="#FFF5E6" maxlength="7" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" oninput="syncColorPicker(this.value)">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">미리보기 이미지 URL</label>
          <input id="fieldImageUrl" type="text" placeholder="https://..." class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
      </div>

      <!-- Active checkbox -->
      <div class="flex items-center gap-2">
        <input id="fieldIsActive" type="checkbox" checked class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
        <label for="fieldIsActive" class="text-sm text-gray-700">활성 상태</label>
      </div>

      <!-- Custom Fields Editor -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <label class="text-sm font-medium text-gray-700">커스텀 영역</label>
          <button onclick="addCustomField()" class="text-blue-600 hover:text-blue-700 text-xs font-medium flex items-center gap-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            영역 추가
          </button>
        </div>
        <div id="customFieldsContainer" class="space-y-3"></div>
        <p id="noFieldsMsg" class="text-xs text-gray-400 text-center py-4">커스텀 영역이 없습니다. "영역 추가"를 클릭하세요.</p>
      </div>
    </div>

    <!-- Modal Footer -->
    <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-200 bg-gray-50 rounded-b-xl">
      <button onclick="closeModal()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 font-medium transition-colors">취소</button>
      <button id="saveBtn" onclick="saveSticker()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
        <span id="saveBtnText">저장</span>
        <div id="saveBtnSpinner" class="hidden spinner-sm" style="border-top-color:#fff;border-color:rgba(255,255,255,0.3);"></div>
      </button>
    </div>
  </div>
</div>

<script>
  // ─── State ──────────────────────────────────────────────
  const API_BASE = '/barungift/api/stickers';
  let stickers = [];
  let editingId = null;  // null = create, string = editing
  let customFieldCounter = 0;

  // ─── Toast ──────────────────────────────────────────────
  function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    const colors = {
      success: 'bg-green-600',
      error: 'bg-red-600',
      info: 'bg-blue-600',
    };
    toast.className = `${colors[type] || colors.info} text-white px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium toast-slide flex items-center gap-2 max-w-sm`;
    const icons = {
      success: '<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
      error: '<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>',
      info: '<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    };
    toast.innerHTML = `${icons[type] || icons.info}<span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.transition = 'opacity 0.3s';
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  // ─── API helpers ────────────────────────────────────────
  async function apiFetch(url, options = {}) {
    const resp = await fetch(url, {
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json', ...options.headers },
      ...options,
    });
    if (!resp.ok) {
      const body = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${body}`);
    }
    return resp.json();
  }

  // ─── Load stickers ─────────────────────────────────────
  async function loadStickers() {
    const loading = document.getElementById('loadingState');
    const empty = document.getElementById('emptyState');
    const error = document.getElementById('errorState');
    const table = document.getElementById('tableContainer');

    loading.classList.remove('hidden');
    empty.classList.add('hidden');
    error.classList.add('hidden');
    table.classList.add('hidden');

    try {
      const data = await apiFetch(API_BASE);
      stickers = data.stickers || [];

      loading.classList.add('hidden');

      if (stickers.length === 0) {
        empty.classList.remove('hidden');
      } else {
        table.classList.remove('hidden');
        renderTable();
      }
    } catch (e) {
      loading.classList.add('hidden');
      error.classList.remove('hidden');
      document.getElementById('errorStateMsg').textContent = e.message;
    }
  }

  // ─── Render table ───────────────────────────────────────
  function renderTable() {
    const tbody = document.getElementById('stickerTableBody');
    tbody.innerHTML = '';

    stickers.forEach((s, idx) => {
      const tr = document.createElement('tr');
      tr.className = `border-b border-gray-100 hover:bg-gray-50 transition-colors ${idx % 2 === 1 ? 'bg-gray-50/50' : ''}`;

      const fieldCount = (s.custom_fields || []).length;
      const isActive = s.is_active !== false;
      const createdDate = s.created_at ? formatDate(s.created_at) : '-';

      tr.innerHTML = `
        <td class="px-4 py-3">
          ${s.preview_image_url
            ? `<img src="${escapeHtml(s.preview_image_url)}" alt="" class="w-12 h-12 rounded-lg object-cover border border-gray-200">`
            : `<div class="w-12 h-12 rounded-lg border border-gray-200" style="background-color:${escapeHtml(s.preview_color || '#FFF5E6')}"></div>`
          }
        </td>
        <td class="px-4 py-3">
          <div class="font-medium text-gray-900">${escapeHtml(s.name)}</div>
          <div class="text-xs text-gray-400 font-mono mt-0.5">${escapeHtml(s.id || '').slice(0, 8)}...</div>
        </td>
        <td class="px-4 py-3 text-center">
          <span class="inline-flex items-center justify-center w-7 h-7 rounded-full ${fieldCount > 0 ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-400'} text-xs font-semibold">${fieldCount}</span>
        </td>
        <td class="px-4 py-3 text-center">
          <span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium ${isActive ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}">${isActive ? '활성' : '비활성'}</span>
        </td>
        <td class="px-4 py-3 text-gray-500 text-xs">${createdDate}</td>
        <td class="px-4 py-3 text-center">
          <div class="flex items-center justify-center gap-1">
            <button onclick="openEditModal('${s.id}')" class="p-1.5 rounded-lg hover:bg-blue-50 text-gray-400 hover:text-blue-600 transition-colors" title="수정">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            <button onclick="deleteSticker('${s.id}', '${escapeHtml(s.name)}')" class="p-1.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-600 transition-colors" title="삭제">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });

    const activeCount = stickers.filter(s => s.is_active !== false).length;
    document.getElementById('stickerCount').textContent = `전체 ${stickers.length}개 (활성 ${activeCount}개)`;
  }

  // ─── Modal: Open for Create ─────────────────────────────
  function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '스티커 생성';
    document.getElementById('fieldName').value = '';
    document.getElementById('fieldColorPicker').value = '#FFF5E6';
    document.getElementById('fieldColorHex').value = '#FFF5E6';
    document.getElementById('fieldImageUrl').value = '';
    document.getElementById('fieldIsActive').checked = true;
    document.getElementById('customFieldsContainer').innerHTML = '';
    customFieldCounter = 0;
    updateNoFieldsMsg();
    showModal();
  }

  // ─── Modal: Open for Edit ──────────────────────────────
  function openEditModal(id) {
    const sticker = stickers.find(s => s.id === id);
    if (!sticker) return;

    editingId = id;
    document.getElementById('modalTitle').textContent = '스티커 수정';
    document.getElementById('fieldName').value = sticker.name || '';
    const color = sticker.preview_color || '#FFF5E6';
    document.getElementById('fieldColorPicker').value = color;
    document.getElementById('fieldColorHex').value = color;
    document.getElementById('fieldImageUrl').value = sticker.preview_image_url || '';
    document.getElementById('fieldIsActive').checked = sticker.is_active !== false;

    // Populate custom fields
    const container = document.getElementById('customFieldsContainer');
    container.innerHTML = '';
    customFieldCounter = 0;
    (sticker.custom_fields || []).forEach(f => {
      addCustomField(f);
    });
    updateNoFieldsMsg();
    showModal();
  }

  function showModal() {
    document.getElementById('stickerModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    // Focus name field
    setTimeout(() => document.getElementById('fieldName').focus(), 100);
  }

  function closeModal() {
    document.getElementById('stickerModal').classList.add('hidden');
    document.body.style.overflow = '';
  }

  // ─── Custom Field management ────────────────────────────
  function addCustomField(data = null) {
    customFieldCounter++;
    const idx = customFieldCounter;
    const container = document.getElementById('customFieldsContainer');

    const div = document.createElement('div');
    div.className = 'bg-gray-50 border border-gray-200 rounded-lg p-3 fade-in';
    div.id = `cf-${idx}`;
    div.innerHTML = `
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-semibold text-gray-500">영역 #${idx}</span>
        <button onclick="removeCustomField(${idx})" class="text-gray-400 hover:text-red-500 transition-colors" title="삭제">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="grid grid-cols-12 gap-2">
        <!-- Row 1: Label, Type, MaxLen, Required -->
        <div class="col-span-4">
          <label class="block text-xs text-gray-500 mb-0.5">라벨</label>
          <input type="text" data-cf="${idx}" data-field="label" value="${escapeHtml(data?.field_label || '')}" placeholder="보내는 분" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>
        <div class="col-span-3">
          <label class="block text-xs text-gray-500 mb-0.5">유형</label>
          <select data-cf="${idx}" data-field="type" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white">
            <option value="text" ${(data?.field_type || 'text') === 'text' ? 'selected' : ''}>텍스트</option>
            <option value="date" ${data?.field_type === 'date' ? 'selected' : ''}>날짜</option>
            <option value="select" ${data?.field_type === 'select' ? 'selected' : ''}>선택</option>
          </select>
        </div>
        <div class="col-span-3">
          <label class="block text-xs text-gray-500 mb-0.5">최대글자수</label>
          <input type="number" data-cf="${idx}" data-field="max_length" value="${data?.max_length ?? 20}" min="1" max="200" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>
        <div class="col-span-2 flex items-end pb-1">
          <label class="flex items-center gap-1 text-xs text-gray-600 cursor-pointer">
            <input type="checkbox" data-cf="${idx}" data-field="required" ${data?.required ? 'checked' : ''} class="w-3.5 h-3.5 text-blue-600 border-gray-300 rounded">
            필수
          </label>
        </div>
        <!-- Row 2: Position -->
        <div class="col-span-3">
          <label class="block text-xs text-gray-500 mb-0.5">X%</label>
          <input type="number" data-cf="${idx}" data-field="pos_x" value="${data?.position?.x ?? 0}" min="0" max="100" step="0.1" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>
        <div class="col-span-3">
          <label class="block text-xs text-gray-500 mb-0.5">Y%</label>
          <input type="number" data-cf="${idx}" data-field="pos_y" value="${data?.position?.y ?? 0}" min="0" max="100" step="0.1" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>
        <div class="col-span-3">
          <label class="block text-xs text-gray-500 mb-0.5">W%</label>
          <input type="number" data-cf="${idx}" data-field="pos_w" value="${data?.position?.w ?? 40}" min="0" max="100" step="0.1" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>
        <div class="col-span-3">
          <label class="block text-xs text-gray-500 mb-0.5">H%</label>
          <input type="number" data-cf="${idx}" data-field="pos_h" value="${data?.position?.h ?? 10}" min="0" max="100" step="0.1" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>
      </div>
    `;
    container.appendChild(div);
    updateNoFieldsMsg();
  }

  function removeCustomField(idx) {
    const el = document.getElementById(`cf-${idx}`);
    if (el) el.remove();
    updateNoFieldsMsg();
  }

  function updateNoFieldsMsg() {
    const container = document.getElementById('customFieldsContainer');
    const msg = document.getElementById('noFieldsMsg');
    msg.classList.toggle('hidden', container.children.length > 0);
  }

  // ─── Collect custom fields from DOM ─────────────────────
  function collectCustomFields() {
    const container = document.getElementById('customFieldsContainer');
    const fieldDivs = container.querySelectorAll('[id^="cf-"]');
    const fields = [];
    let fieldIdCounter = 0;

    fieldDivs.forEach(div => {
      const cfIdx = div.id.replace('cf-', '');
      const get = (name) => div.querySelector(`[data-cf="${cfIdx}"][data-field="${name}"]`);

      fieldIdCounter++;
      fields.push({
        field_id: `f${fieldIdCounter}`,
        field_label: get('label')?.value?.trim() || `영역 ${fieldIdCounter}`,
        field_type: get('type')?.value || 'text',
        max_length: parseInt(get('max_length')?.value) || 20,
        required: get('required')?.checked || false,
        options: [],
        position: {
          x: parseFloat(get('pos_x')?.value) || 0,
          y: parseFloat(get('pos_y')?.value) || 0,
          w: parseFloat(get('pos_w')?.value) || 40,
          h: parseFloat(get('pos_h')?.value) || 10,
        },
        font_size: 14,
      });
    });
    return fields;
  }

  // ─── Save sticker ──────────────────────────────────────
  async function saveSticker() {
    const name = document.getElementById('fieldName').value.trim();
    if (!name) {
      showToast('스티커명을 입력하세요.', 'error');
      document.getElementById('fieldName').focus();
      return;
    }

    const body = {
      name,
      preview_color: document.getElementById('fieldColorHex').value.trim() || '#FFF5E6',
      preview_image_url: document.getElementById('fieldImageUrl').value.trim() || null,
      is_active: document.getElementById('fieldIsActive').checked,
      custom_fields: collectCustomFields(),
    };

    const btn = document.getElementById('saveBtn');
    const btnText = document.getElementById('saveBtnText');
    const btnSpinner = document.getElementById('saveBtnSpinner');

    btn.disabled = true;
    btnText.textContent = '저장 중...';
    btnSpinner.classList.remove('hidden');

    try {
      if (editingId) {
        await apiFetch(`${API_BASE}/${editingId}`, {
          method: 'PUT',
          body: JSON.stringify(body),
        });
        showToast('스티커가 수정되었습니다.');
      } else {
        await apiFetch(API_BASE, {
          method: 'POST',
          body: JSON.stringify(body),
        });
        showToast('스티커가 생성되었습니다.');
      }
      closeModal();
      await loadStickers();
    } catch (e) {
      showToast(`저장 실패: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
      btnText.textContent = '저장';
      btnSpinner.classList.add('hidden');
    }
  }

  // ─── Delete sticker ────────────────────────────────────
  async function deleteSticker(id, name) {
    if (!confirm(`"${name}" 스티커를 비활성화(삭제)하시겠습니까?`)) return;

    try {
      await apiFetch(`${API_BASE}/${id}`, { method: 'DELETE' });
      showToast('스티커가 비활성화되었습니다.');
      await loadStickers();
    } catch (e) {
      showToast(`삭제 실패: ${e.message}`, 'error');
    }
  }

  // ─── Helpers ───────────────────────────────────────────
  function escapeHtml(str) {
    if (!str) return '';
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    return String(str).replace(/[&<>"']/g, c => map[c]);
  }

  function formatDate(isoStr) {
    try {
      const d = new Date(isoStr);
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
    } catch {
      return '-';
    }
  }

  function syncColorPicker(hex) {
    const picker = document.getElementById('fieldColorPicker');
    if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
      picker.value = hex;
    }
  }

  // Close modal on backdrop click
  document.getElementById('stickerModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  // Close modal on Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !document.getElementById('stickerModal').classList.contains('hidden')) {
      closeModal();
    }
  });

  // ─── Init ──────────────────────────────────────────────
  loadStickers();
</script>
</body>
</html>
